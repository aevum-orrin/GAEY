# Tooling config for the GAEY local voice backend (Plan A).
# Code and comments are English-only per project convention.

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]

[tool.mypy]
python_version = "3.11"
disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
  "live: requires real models/services (Ollama/Whisper/Kokoro); skipped by default",
]
addopts = "-m 'not live'"
